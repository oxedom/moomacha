name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  control-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uvx ruff check .
      - run: uv run pytest

  exec-mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: exec-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run pytest

  whatsapp-sidecar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: whatsapp-sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: npm test
